<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Table from Image</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; padding-top: 40px; }
        .container { max-width: 600px; background-color: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h3 { margin-bottom: 25px; }
        .form-label { font-weight: 500; }
        .btn-primary { padding: 10px 20px; }
        #fileNameDisplay { margin-top: 10px; font-style: italic; color: #6c757d; }
        .alert { margin-top: 20px;}
    </style>
</head>
<body>
    <div class="container">
        <h3 class="text-center">Image Table to Excel Converter</h3>

        {% if error %}
            <div id="error-message" class="alert alert-danger" role="alert">
                <strong>Error:</strong> {{ error }}
            </div>
        {% endif %}
        {% if message %}
            <div id="info-message" class="alert alert-info" role="alert">
                {{ message }}
            </div>
        {% endif %}

        <form method="POST" enctype="multipart/form-data" action="{% url 'extract_table_page' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="imageUpload" class="form-label">Upload Image Containing a Table:</label>
                <input class="form-control" type="file" id="imageUpload" name="image_file" accept="image/*" required onchange="displayFileName(this)">
                <div id="fileNameDisplay"></div>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="fa-solid fa-file-excel"></i> Extract and Download Excel
            </button>
        </form>
    </div>

    <script>
        function displayFileName(input) {
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            if (input.files && input.files.length > 0) {
                fileNameDisplay.textContent = 'Selected: ' + input.files[0].name;
            } else {
                fileNameDisplay.textContent = '';
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
        const errorMessage = document.getElementById("error-message");
        const infoMessage = document.getElementById("info-message");

        if (errorMessage) {
            setTimeout(() => {
                errorMessage.style.display = "none";
            }, 3000);  // 3000 milliseconds = 3 seconds
        }

        if (infoMessage) {
            setTimeout(() => {
                infoMessage.style.display = "none";
            }, 3000);
        }
    });
        
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
